<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Carbonada - Empanadas Caseras</title>
    <style>
        /* --- VARIABLES DE COLOR --- */
        :root {
            --color-fondo: #fcf8f2;
            --color-card: #ffffff;
            --color-principal: #5d4037;
            --color-acento: #8d6e63;
            --color-texto-oscuro: #212121;
            --color-texto-claro: #ffffff;
            --color-borde: #e0d7cd;
            --color-resaltado: #d84315;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--color-fondo);
            font-family: 'Georgia', serif;
            color: var(--color-texto-oscuro);
        }

        .hidden { display: none !important; }

        .splash-container { text-align: center; animation: fadeIn 1s ease-in; }
        .logo-ring { font-size: 80px; margin-bottom: 10px; filter: sepia(0.5); }
        .title { color: var(--color-principal); margin: 0; font-size: 2.8rem; font-weight: bold; text-transform: uppercase; }
        .subtitle { color: var(--color-acento); letter-spacing: 3px; text-transform: uppercase; font-size: 0.9rem; margin-top: 5px; font-family: 'Segoe UI', sans-serif; }

        .shop-container {
            width: 95%; max-width: 400px; height: 95vh; max-height: 850px;
            background: var(--color-card); border-radius: 30px;
            box-shadow: 0 15px 35px rgba(93, 64, 55, 0.15);
            display: flex; flex-direction: column; overflow: hidden; border: 2px solid var(--color-borde);
        }

        .header { background: var(--color-principal); color: var(--color-texto-claro); padding: 15px; text-align: center; border-bottom: 4px solid var(--color-acento); }

        .menu-list { flex: 1; overflow-y: auto; padding: 15px; background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiIHZpZXdCb3g9IjAgMCA0IDQiPjxnIGZpbGwtcmVsZT0iZXZlbm9kZCI+PGcgZmlsbD0iI2U4ZTBkNyIgZmlsbC1vcGFjaXR5PSIwLjQiPjxwYXRoIGQ9Ik0wIDBoMnYySDBWMHptMiAySDR2Mkg4VjJ6Ii8+PC9nPjwvZz48L3N2Zz4='); }

        .item-empanada { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--color-borde); }
        .item-info h4 { margin: 0; font-size: 1rem; font-weight: normal; }
        .item-info span { color: var(--color-principal); font-weight: bold; }

        .controls { display: flex; align-items: center; gap: 10px; }
        .btn-qty { background: var(--color-fondo); border: 1px solid var(--color-borde); width: 30px; height: 30px; border-radius: 5px; cursor: pointer; }
        .qty-number { font-family: sans-serif; min-width: 20px; text-align: center; }
        .qty-number.active { color: var(--color-resaltado); font-weight: bold; }

        .footer-total { background: var(--color-card); padding: 15px; border-top: 2px solid var(--color-borde); }
        .input-datos, .select-pago { width: 100%; padding: 10px; margin-bottom: 8px; border: 1px solid var(--color-borde); border-radius: 8px; font-family: sans-serif; }

        .total-row { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; margin: 10px 0; color: var(--color-principal); }
        .btn-checkout { background: var(--color-acento); color: white; border: none; padding: 15px; border-radius: 8px; font-size: 1rem; font-weight: bold; text-transform: uppercase; cursor: pointer; width: 100%; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="splash-screen" class="splash-container">
        <div class="logo-ring">🥟</div>
        <h1 class="title">LA CARBONADA</h1>
        <div class="subtitle">empanadas caseras</div>
    </div>

    <div id="shop-screen" class="shop-container hidden">
        <div class="header"><h3>Armá tu pedido</h3></div>
        <div class="menu-list" id="menu-items"></div>

        <div class="footer-total">
            <input type="text" id="nombre-cliente" class="input-datos" placeholder="Tu nombre">
            <input type="text" id="direccion-cliente" class="input-datos" placeholder="Dirección de entrega">
            
            <select id="metodo-pago" class="select-pago">
                <option value="Transferencia">Transferencia / Mercado Pago</option>
            </select>

            <div class="total-row">
                <span>TOTAL</span>
                <span>$<span id="total-precio">0</span></span>
            </div>
            <button class="btn-checkout" onclick="enviarPedido()">Enviar pedido por WhatsApp</button>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ---
        const TELEFONO_WHATSAPP = "5493517485182"; 
        const MI_ALIAS_MP = "LA.CARBONADA.MP";

        const empanadas = [
            { id: 'matambre', nombre: 'Matambre a cuchillo', precio: 1500 },
            { id: 'pollo', nombre: 'Pollo', precio: 1500 },
            { id: 'arabes', nombre: 'Árabes con limón', precio: 1500 },
            { id: 'queso', nombre: 'Queso y Cebolla caramelizada', precio: 1500 },
            { id: 'humita', nombre: 'Humita cremosa', precio: 1500 },
            { id: 'caprese', nombre: 'Caprese (Muzzarella y Albahaca)', precio: 1500 },
            { id: 'saladas', nombre: 'Carne Salada Clásica', precio: 1500 },
            { id: 'dulces', nombre: 'Dulces', precio: 1500 }
        ];

        let carrito = {};
        empanadas.forEach(emp => carrito[emp.id] = 0);

        function renderMenu() {
            const container = document.getElementById('menu-items');
            container.innerHTML = empanadas.map(emp => `
                <div class="item-empanada">
                    <div class="item-info">
                        <h4>${emp.nombre}</h4>
                        <span>$${emp.precio}</span>
                    </div>
                    <div class="controls">
                        <button class="btn-qty" onclick="cambiarCant('${emp.id}', -1)">-</button>
                        <span class="qty-number" id="qty-${emp.id}">0</span>
                        <button class="btn-qty" onclick="cambiarCant('${emp.id}', 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        function cambiarCant(id, cambio) {
            if (carrito[id] + cambio >= 0) {
                carrito[id] += cambio;
                document.getElementById(`qty-${id}`).innerText = carrito[id];
                actualizarTotal();
            }
        }

        function actualizarTotal() {
            let total = 0;
            empanadas.forEach(emp => total += carrito[emp.id] * emp.precio);
            document.getElementById('total-precio').innerText = total;
        }

        function enviarPedido() {
            const nombre = document.getElementById('nombre-cliente').value.trim();
            const direccion = document.getElementById('direccion-cliente').value.trim();
            const metodo = document.getElementById('metodo-pago').value;
            
            // Obtener Fecha y Hora actual
            const ahora = new Date();
            const fechaString = ahora.toLocaleDateString('es-AR');
            const horaString = ahora.getHours().toString().padStart(2, '0') + ":" + ahora.getMinutes().toString().padStart(2, '0');

            let total = 0;
            let resumen = "🥟 *NUEVO PEDIDO - LA CARBONADA* \n";
            resumen += `📅 *FECHA:* ${fechaString}\n`;
            resumen += `🕒 *HORA:* ${horaString}\n\n`;
            let hayProductos = false;

            if (!nombre || !direccion) {
                alert("Por favor, completa tu nombre y dirección.");
                return;
            }

            empanadas.forEach(emp => {
                const cantidad = carrito[emp.id];
                if (cantidad > 0) {
                    const subtotal = cantidad * emp.precio;
                    resumen += `• *${cantidad}x* ${emp.nombre}\n`;
                    total += subtotal;
                    hayProductos = true;
                }
            });

            if (hayProductos) {
                resumen += `\n💰 *TOTAL: $${total}*`;
                resumen += `\n👤 *CLIENTE:* ${nombre}`;
                resumen += `\n📍 *ENTREGA:* ${direccion}`;
                resumen += `\n💳 *PAGO:* ${metodo}`;
                resumen += `\n\n───────────────\n`;

                resumen += `✅ *DATOS DE PAGO:*\n`;
                resumen += `Alias: *${MI_ALIAS_MP}*\n`;
                resumen += `Monto: *$${total}*\n`;
                resumen += `_(Enviaré el comprobante por aquí)_`;

                const urlWhatsapp = `https://wa.me/${TELEFONO_WHATSAPP}?text=${encodeURIComponent(resumen)}`;
                window.open(urlWhatsapp, '_blank');
            } else {
                alert('Selecciona al menos una empanada.');
            }
        }

        window.addEventListener('load', () => {
            renderMenu();
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hidden');
                document.getElementById('shop-screen').classList.remove('hidden');
            }, 2200);
        });
    </script>
</body>
</html>
