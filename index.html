<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Carbonada - Empanadas Caseras</title>
    <style>
        /* --- VARIABLES DE COLOR --- */
        :root {
            --color-fondo: #fcf8f2;
            --color-card: #ffffff;
            --color-principal: #5d4037;
            --color-acento: #8d6e63;
            --color-texto-oscuro: #212121;
            --color-texto-claro: #ffffff;
            --color-borde: #e0d7cd;
            --color-resaltado: #d84315; /* Naranja rústico para énfasis */
        }

        /* --- ESTILOS GENERALES --- */
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--color-fondo);
            font-family: 'Georgia', serif;
            color: var(--color-texto-oscuro);
        }

        .hidden { display: none !important; }

        /* --- SPLASH SCREEN --- */
        .splash-container {
            text-align: center;
            animation: fadeIn 1s ease-in;
        }

        .logo-ring { font-size: 80px; margin-bottom: 10px; filter: sepia(0.5); }
        
        .title { 
            color: var(--color-principal); 
            margin: 0; 
            font-size: 2.8rem; 
            font-weight: bold; 
            text-transform: uppercase;
        }
        
        .subtitle { 
            color: var(--color-acento); 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            font-size: 0.9rem; 
            margin-top: 5px;
            font-family: 'Segoe UI', sans-serif;
        }

        /* --- TIENDA --- */
        .shop-container {
            width: 95%;
            max-width: 400px;
            height: 90vh;
            max-height: 800px;
            background: var(--color-card);
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(93, 64, 55, 0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 2px solid var(--color-borde);
        }

        .header {
            background: var(--color-principal);
            color: var(--color-texto-claro);
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--color-acento);
        }

        .header h3 { margin: 0; font-size: 1.2rem; text-transform: uppercase; }

        .menu-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiIHZpZXdCb3g9IjAgMCA0IDQiPjxnIGZpbGwtcmVsZT0iZXZlbm9kZCI+PGcgZmlsbD0iI2U4ZTBkNyIgZmlsbC1vcGFjaXR5PSIwLjQiPjxwYXRoIGQ9Ik0wIDBoMnYySDBWMHptMiAySDR2Mkg4VjJ6Ii8+PC9nPjwvZz48L3N2Zz4=');
            -webkit-overflow-scrolling: touch;
        }

        .item-empanada {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--color-borde);
        }

        .item-info h4 { margin: 0; font-size: 1rem; font-weight: normal; }
        .item-info span { color: var(--color-principal); font-weight: bold; font-family: 'Segoe UI', sans-serif; }

        .controls { display: flex; align-items: center; gap: 12px; }

        .btn-qty {
            background: var(--color-fondo);
            color: var(--color-principal);
            border: 1px solid var(--color-borde);
            width: 35px; height: 35px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.2rem;
            display: flex; justify-content: center; align-items: center;
            transition: 0.2s;
        }

        .btn-qty:active { transform: scale(0.9); }

        .qty-number { font-family: 'Segoe UI', sans-serif; min-width: 20px; text-align: center; transition: 0.3s; }
        .qty-number.active { color: var(--color-resaltado); font-weight: bold; transform: scale(1.2); }

        /* --- FOOTER --- */
        .footer-total {
            background: var(--color-card);
            padding: 20px;
            border-top: 2px solid var(--color-borde);
        }

        .input-datos {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid var(--color-borde);
            border-radius: 8px;
            box-sizing: border-box;
            font-family: sans-serif;
            font-size: 0.9rem;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--color-principal);
            font-family: 'Segoe UI', sans-serif;
        }

        .btn-checkout {
            background: var(--color-acento);
            color: var(--color-texto-claro);
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        .btn-checkout:hover { background: var(--color-principal); }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="splash-screen" class="splash-container">
        <div class="logo-ring">🥟</div>
        <h1 class="title">LA CARBONADA</h1>
        <div class="subtitle">empanadas caseras</div>
    </div>

    <div id="shop-screen" class="shop-container hidden">
        <div class="header">
            <h3>Armá tu pedido</h3>
        </div>

        <div class="menu-list" id="menu-items">
        </div>

        <div class="footer-total">
            <input type="text" id="nombre-cliente" class="input-datos" placeholder="Tu nombre">
            <input type="text" id="direccion-cliente" class="input-datos" placeholder="Dirección de entrega">
            
            <div class="total-row">
                <span>TOTAL</span>
                <span>$<span id="total-precio">0</span></span>
            </div>
            <button class="btn-checkout" onclick="enviarPedido()">Confirmar Pedido</button>
        </div>
    </div>

    <script>
        // --- CONFIGURACIÓN ACTUALIZADA ---
        const TELEFONO_WHATSAPP = "5493517485182"; 

        const empanadas = [
            { id: 'matambre', nombre: 'Matambre a cuchillo', precio: 1400 },
            { id: 'arabes', nombre: 'Árabes con limón', precio: 1300 },
            { id: 'queso', nombre: 'Queso y Cebolla caramelizada', precio: 1200 },
            { id: 'humita', nombre: 'Humita cremosa', precio: 1200 },
            { id: 'caprese', nombre: 'Caprese (Muzzarella y Albahaca)', precio: 1250 },
            { id: 'saladas', nombre: 'Carne Salada Clásica', precio: 1200 },
            { id: 'dulces', nombre: 'Dulces', precio: 1100 }
        ];

        let carrito = {};
        empanadas.forEach(emp => carrito[emp.id] = 0);

        function renderMenu() {
            const container = document.getElementById('menu-items');
            container.innerHTML = empanadas.map(emp => `
                <div class="item-empanada">
                    <div class="item-info">
                        <h4>${emp.nombre}</h4>
                        <span>$${emp.precio}</span>
                    </div>
                    <div class="controls">
                        <button class="btn-qty" onclick="cambiarCant('${emp.id}', -1)" aria-label="Quitar">-</button>
                        <span class="qty-number" id="qty-${emp.id}">0</span>
                        <button class="btn-qty" onclick="cambiarCant('${emp.id}', 1)" aria-label="Agregar">+</button>
                    </div>
                </div>
            `).join('');
        }

        function cambiarCant(id, cambio) {
            if (carrito[id] + cambio >= 0) {
                carrito[id] += cambio;
                const qtyElement = document.getElementById(`qty-${id}`);
                qtyElement.innerText = carrito[id];
                
                if (carrito[id] > 0) {
                    qtyElement.classList.add('active');
                } else {
                    qtyElement.classList.remove('active');
                }
                
                actualizarTotal();
            }
        }

        function actualizarTotal() {
            let total = 0;
            empanadas.forEach(emp => {
                total += carrito[emp.id] * emp.precio;
            });
            document.getElementById('total-precio').innerText = total;
        }

        function enviarPedido() {
            const nombre = document.getElementById('nombre-cliente').value.trim();
            const direccion = document.getElementById('direccion-cliente').value.trim();
            let total = 0;
            let resumen = "🥟 *NUEVO PEDIDO - LA CARBONADA* \n\n";
            let hayProductos = false;

            if (!nombre || !direccion) {
                alert("Por favor, completa tu nombre y dirección.");
                return;
            }

            empanadas.forEach(emp => {
                const cantidad = carrito[emp.id];
                if (cantidad > 0) {
                    const subtotal = cantidad * emp.precio;
                    resumen += `• *${cantidad}x* ${emp.nombre} _($${subtotal})_\n`;
                    total += subtotal;
                    hayProductos = true;
                }
            });

            if (hayProductos) {
                resumen += `\n───────────────\n`;
                resumen += `💰 *TOTAL: $${total}*\n`;
                resumen += `👤 *CLIENTE:* ${nombre}\n`;
                resumen += `📍 *ENTREGA:* ${direccion}\n`;
                resumen += `───────────────\n`;
                resumen += `\n_¡Hola! Quisiera confirmar este pedido._`;

                const urlWhatsapp = `https://wa.me/${TELEFONO_WHATSAPP}?text=${encodeURIComponent(resumen)}`;
                window.open(urlWhatsapp, '_blank');
            } else {
                alert('Por favor, selecciona al menos una empanada.');
            }
        }

        window.addEventListener('load', () => {
            renderMenu();
            setTimeout(() => {
                document.getElementById('splash-screen').classList.add('hidden');
                document.getElementById('shop-screen').classList.remove('hidden');
            }, 2200); 
        });
    </script>
</body>
</html>
